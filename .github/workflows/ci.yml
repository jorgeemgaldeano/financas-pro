name: CI

# Roda a suíte de testes (Vitest) e o build a cada push e pull request.
# Objetivo: travar regressões antes do merge em develop/main, conforme a
# pirâmide de testes definida em docs/CLAUDE.md (unitário → integração → E2E → CI).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Testes e build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Rodar testes
        run: npm test

      - name: Build de produção
        run: npm run build
